<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>QC Scanner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #0f172a; 
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
            min-height: 100vh; font-family: sans-serif; 
            padding: 20px; overflow: hidden;
        }
        h1 { 
            color: white; font-size: 12px; font-weight: 900; 
            letter-spacing: 0.2em; text-transform: uppercase; 
            margin-bottom: 16px; opacity: 0.5; 
        }
        #scanner-wrap { 
            position: relative; width: 100%; max-width: 400px; 
            aspect-ratio: 1; border-radius: 20px; overflow: hidden; 
            background: #000; 
        }
        #preview { 
            width: 100%; height: 100%; object-fit: cover; 
            display: block;
        }
        #overlay { 
            position: absolute; inset: 0; 
            display: flex; align-items: center; justify-content: center; 
            pointer-events: none; 
        }
        #frame { 
            width: 65%; height: 65%; 
            border: 2px solid rgba(251,191,36,0.8); 
            border-radius: 12px; position: relative; 
            box-shadow: 0 0 0 9999px rgba(0,0,0,0.45);
        }
        .c { position: absolute; width: 20px; height: 20px; border-color: white; border-style: solid; }
        .tl { top:-2px; left:-2px; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
        .tr { top:-2px; right:-2px; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
        .bl { bottom:-2px; left:-2px; border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
        .br { bottom:-2px; right:-2px; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }
        #scanline { 
            position: absolute; left: 5%; right: 5%; height: 2px; 
            background: linear-gradient(90deg, transparent, #fbbf24, transparent); 
            animation: scan 1.5s ease-in-out infinite; top: 0;
        }
        @keyframes scan { 
            0% { top: 5%; opacity: 1; } 
            50% { top: 90%; opacity: 1; } 
            100% { top: 5%; opacity: 1; } 
        }
        #status { 
            color: rgba(255,255,255,0.5); font-size: 11px; font-weight: 700; 
            text-transform: uppercase; letter-spacing: 0.12em; 
            margin-top: 14px; text-align: center; min-height: 20px;
        }
        #success-screen {
            display: none; flex-direction: column; align-items: center; 
            gap: 16px; text-align: center;
        }
        #success-icon { font-size: 56px; }
        #success-id { 
            color: #fbbf24; font-size: 26px; font-weight: 900; 
            letter-spacing: 0.05em; 
        }
        #success-label { 
            color: rgba(255,255,255,0.4); font-size: 10px; 
            font-weight: 700; text-transform: uppercase; letter-spacing: 0.2em; 
        }
        #success-msg {
            color: #4ade80; font-size: 12px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.1em;
        }
        #rescan-btn { 
            background: rgba(255,255,255,0.1); color: white; 
            border: 1px solid rgba(255,255,255,0.2); 
            padding: 12px 28px; border-radius: 12px; 
            font-weight: 900; font-size: 12px; 
            text-transform: uppercase; letter-spacing: 0.15em; 
            cursor: pointer; margin-top: 8px;
        }
        #torch-btn {
            margin-top: 12px;
            background: rgba(251,191,36,0.15); color: #fbbf24; 
            border: 1px solid rgba(251,191,36,0.3); 
            padding: 10px 24px; border-radius: 12px; 
            font-weight: 900; font-size: 11px; 
            text-transform: uppercase; letter-spacing: 0.15em; 
            cursor: pointer; display: none;
        }
    </style>
</head>
<body>

    <div id="start-screen" style="position: fixed; inset: 0; z-index: 999; background: #0f172a; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;">
        <div style="background: rgba(251,191,36,0.1); padding: 15px; border-radius: 12px; border: 1px solid rgba(251,191,36,0.3); margin-bottom: 30px; text-align: center;">
            <p style="color: #fbbf24; font-size: 12px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em;">⚠️ Important</p>
            <p style="color: white; font-size: 11px; margin-top: 5px;">If using Brave Browser, turn OFF the orange Lion Shield or the camera will stay black.</p>
        </div>
        <button onclick="startApp()" style="background: #4f46e5; color: white; padding: 20px 40px; border-radius: 20px; font-size: 16px; font-weight: 900; border: none; box-shadow: 0 10px 30px rgba(79, 70, 229, 0.4); text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer;">
            📸 Tap To Start Camera
        </button>
    </div>

    <h1>Point Camera at QR Code</h1>

    <div id="scanner-wrap">
        <video id="preview" playsinline autoplay muted></video>
        <div id="overlay">
            <div id="frame">
                <div class="c tl"></div><div class="c tr"></div>
                <div class="c bl"></div><div class="c br"></div>
                <div id="scanline"></div>
            </div>
        </div>
    </div>

    <p id="status">Waiting for camera...</p>
    
    <div id="controls" style="display: none; gap: 10px; margin-top: 12px; z-index: 50;">
        <button onclick="switchCamera()" style="background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 12px 24px; border-radius: 12px; font-weight: 900; font-size: 11px; text-transform: uppercase; letter-spacing: 0.15em; cursor: pointer;">🔄 Switch Lens</button>
        <button id="torch-btn" onclick="toggleTorch()" style="display:none; background: rgba(251,191,36,0.15); color: #fbbf24; border: 1px solid rgba(251,191,36,0.3); padding: 10px 24px; border-radius: 12px; font-weight: 900; font-size: 11px; text-transform: uppercase; letter-spacing: 0.15em; cursor: pointer;">⚡ Flash</button>
    </div>

    <div id="success-screen">
        <div id="success-icon">✅</div>
        <p id="success-label">Order ID Scanned</p>
        <p id="success-id"></p>
        <p id="success-msg">Returning to console...</p>
        <button id="rescan-btn" onclick="restartScanner()">Scan Again</button>
    </div>

    <script type="module">
        import { BrowserMultiFormatReader } from 'https://esm.sh/@zxing/browser@0.1.4';
        import { DecodeHintType, BarcodeFormat } from 'https://esm.sh/@zxing/library@0.20.0';

        const params = new URLSearchParams(window.location.search);
        const returnUrl = params.get('return');

        let codeReader;
        let videoDevices = [];
        let currentDeviceIndex = 0;
        let locked = false;

        // THE NEW START APP FUNCTION
        // THE PERMISSION PRIMER
        window.startApp = async function() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('status').style.display = 'block';
            document.getElementById('status').textContent = 'Requesting camera permission...';

            try {
                // 1. Force the browser to show the "Allow Camera" popup FIRST
                const primerStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                
                // 2. As soon as they click Allow, shut off this temporary stream
                primerStream.getTracks().forEach(track => track.stop());

                // 3. NOW the phone will let us see the actual hardware lenses
                document.getElementById('controls').style.display = 'flex';
                initScanner();

            } catch (err) {
                // If they click "Deny" or the OS is blocking it
                document.getElementById('status').textContent = 'Permission denied.';
                alert("CAMERA BLOCKED: " + err.message + "\n\nPlease go to your phone Settings, find your browser app, and explicitly allow Camera access.");
                
                // Bring back the start button so they can try again
                document.getElementById('start-screen').style.display = 'flex';
            }
        };

        async function initScanner() {
            const hints = new Map();
            hints.set(DecodeHintType.POSSIBLE_FORMATS, [BarcodeFormat.QR_CODE]);
            hints.set(DecodeHintType.TRY_HARDER, true);
            
            codeReader = new BrowserMultiFormatReader(hints);

            try {
                videoDevices = await BrowserMultiFormatReader.listVideoInputDevices();
                
                if (videoDevices.length === 0) {
                    document.getElementById('status').textContent = 'No cameras found on device.';
                    return;
                }

                let startIdx = videoDevices.findIndex(d => d.label.toLowerCase().includes('back') || d.label.toLowerCase().includes('environment'));
                currentDeviceIndex = startIdx > -1 ? startIdx : 0;

                startDecodingWithDevice(videoDevices[currentDeviceIndex].deviceId);

            } catch (err) {
                document.getElementById('status').textContent = 'Camera permission denied or unavailable.';
                alert("Init Error: " + err.message);
            }
        }

        async function startDecodingWithDevice(deviceId) {
            if (codeReader) codeReader.reset();
            document.getElementById('status').textContent = `Lens ${currentDeviceIndex + 1} of ${videoDevices.length} active`;
            
            try {
                await codeReader.decodeFromVideoDevice(deviceId, 'preview', (result, err) => {
                    if (locked) return;
                    
                    const videoEl = document.getElementById('preview');
                    const stream = videoEl.srcObject;
                    if (stream) {
                        const track = stream.getVideoTracks()[0];
                        if (track && track.getCapabilities && track.getCapabilities().torch) {
                            document.getElementById('torch-btn').style.display = 'block';
                            window.currentTrack = track;
                        } else {
                            document.getElementById('torch-btn').style.display = 'none';
                        }
                    }

                    if (result) {
                        const clean = result.getText().trim().toUpperCase();
                        if (!clean.match(/^\d{6}-[A-Z]+-[A-Z0-9]+$/)) {
                            document.getElementById('status').textContent = 'Invalid QR — not an Order ID';
                            return;
                        }
                        onSuccess(clean);
                    }
                });
            } catch (err) {
                console.error("Decode Error:", err);
            }
        }

        window.switchCamera = function() {
            if (videoDevices.length <= 1) {
                alert("Only one camera detected on this device.");
                return;
            }
            currentDeviceIndex = (currentDeviceIndex + 1) % videoDevices.length;
            startDecodingWithDevice(videoDevices[currentDeviceIndex].deviceId);
        };

        let torchOn = false;
        window.toggleTorch = async function() {
            if (!window.currentTrack) return;
            torchOn = !torchOn;
            try {
                await window.currentTrack.applyConstraints({ advanced: [{ torch: torchOn }] });
            } catch(e) {
                console.warn("Torch failed", e);
            }
        };

        function onSuccess(orderId) {
            locked = true;
            if (codeReader) codeReader.reset();
            
            document.getElementById('scanner-wrap').style.display = 'none';
            document.getElementById('controls').style.display = 'none';
            document.getElementById('status').style.display = 'none';

            document.getElementById('success-id').textContent = orderId;
            document.getElementById('success-screen').style.display = 'flex';

            setTimeout(() => {
                if (returnUrl) {
                    const separator = returnUrl.includes('?') ? '&' : '?';
                    window.location.href = returnUrl + separator + 'scannedId=' + encodeURIComponent(orderId);
                }
            }, 1200);
        }

        window.restartScanner = function() {
            locked = false;
            document.getElementById('scanner-wrap').style.display = 'block';
            document.getElementById('controls').style.display = 'flex';
            document.getElementById('status').style.display = 'block';
            document.getElementById('success-screen').style.display = 'none';
            startDecodingWithDevice(videoDevices[currentDeviceIndex].deviceId);
        };
    </script>
</body>
</html>
