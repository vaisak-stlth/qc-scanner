<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>QC Scanner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #0f172a; 
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
            min-height: 100vh; font-family: sans-serif; 
            padding: 20px; overflow: hidden;
        }
        h1 { 
            color: white; font-size: 12px; font-weight: 900; 
            letter-spacing: 0.2em; text-transform: uppercase; 
            margin-bottom: 16px; opacity: 0.5; 
        }
        #scanner-wrap { 
            position: relative; width: 100%; max-width: 400px; 
            aspect-ratio: 1; border-radius: 20px; overflow: hidden; 
            background: #000; 
        }
        #preview { 
            width: 100%; height: 100%; object-fit: cover; 
            display: block;
        }
        #overlay { 
            position: absolute; inset: 0; 
            display: flex; align-items: center; justify-content: center; 
            pointer-events: none; 
        }
        #frame { 
            width: 65%; height: 65%; 
            border: 2px solid rgba(251,191,36,0.8); 
            border-radius: 12px; position: relative; 
            box-shadow: 0 0 0 9999px rgba(0,0,0,0.45);
        }
        .c { position: absolute; width: 20px; height: 20px; border-color: white; border-style: solid; }
        .tl { top:-2px; left:-2px; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
        .tr { top:-2px; right:-2px; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
        .bl { bottom:-2px; left:-2px; border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
        .br { bottom:-2px; right:-2px; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }
        #scanline { 
            position: absolute; left: 5%; right: 5%; height: 2px; 
            background: linear-gradient(90deg, transparent, #fbbf24, transparent); 
            animation: scan 1.5s ease-in-out infinite; top: 0;
        }
        @keyframes scan { 
            0% { top: 5%; opacity: 1; } 
            50% { top: 90%; opacity: 1; } 
            100% { top: 5%; opacity: 1; } 
        }
        #status { 
            color: rgba(255,255,255,0.5); font-size: 11px; font-weight: 700; 
            text-transform: uppercase; letter-spacing: 0.12em; 
            margin-top: 14px; text-align: center; min-height: 20px;
        }
        #success-screen {
            display: none; flex-direction: column; align-items: center; 
            gap: 16px; text-align: center;
        }
        #success-icon { font-size: 56px; }
        #success-id { 
            color: #fbbf24; font-size: 26px; font-weight: 900; 
            letter-spacing: 0.05em; 
        }
        #success-label { 
            color: rgba(255,255,255,0.4); font-size: 10px; 
            font-weight: 700; text-transform: uppercase; letter-spacing: 0.2em; 
        }
        #success-msg {
            color: #4ade80; font-size: 12px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.1em;
        }
        #rescan-btn { 
            background: rgba(255,255,255,0.1); color: white; 
            border: 1px solid rgba(255,255,255,0.2); 
            padding: 12px 28px; border-radius: 12px; 
            font-weight: 900; font-size: 12px; 
            text-transform: uppercase; letter-spacing: 0.15em; 
            cursor: pointer; margin-top: 8px;
        }
        #torch-btn {
            margin-top: 12px;
            background: rgba(251,191,36,0.15); color: #fbbf24; 
            border: 1px solid rgba(251,191,36,0.3); 
            padding: 10px 24px; border-radius: 12px; 
            font-weight: 900; font-size: 11px; 
            text-transform: uppercase; letter-spacing: 0.15em; 
            cursor: pointer; display: none;
        }
    </style>
</head>
<body>

    <h1>Point Camera at QR Code</h1>

    <div id="scanner-wrap">
        <video id="preview" playsinline autoplay muted></video>
        <div id="overlay">
            <div id="frame">
                <div class="c tl"></div>
                <div class="c tr"></div>
                <div class="c bl"></div>
                <div class="c br"></div>
                <div id="scanline"></div>
            </div>
        </div>
    </div>

    <p id="status">Align QR code within the frame</p>
    <button id="torch-btn" onclick="toggleTorch()">⚡ Toggle Flash</button>

    <div id="success-screen">
        <div id="success-icon">✅</div>
        <p id="success-label">Order ID Scanned</p>
        <p id="success-id"></p>
        <p id="success-msg">Returning to console...</p>
        <button id="rescan-btn" onclick="restartScanner()">Scan Again</button>
    </div>

    <script type="module">
        import { BrowserMultiFormatReader, NotFoundException } from 'https://esm.sh/@zxing/browser@0.1.4';
        import { DecodeHintType, BarcodeFormat } from 'https://esm.sh/@zxing/library@0.20.0';

        const params = new URLSearchParams(window.location.search);
        const returnUrl = params.get('return');

        let codeReader = null;
        let currentStream = null;
        let torchTrack = null;
        let torchOn = false;
        let locked = false;

        async function startScanner() {
    try {
        const hints = new Map();
        hints.set(DecodeHintType.POSSIBLE_FORMATS, [BarcodeFormat.QR_CODE]);
        hints.set(DecodeHintType.TRY_HARDER, true);

        codeReader = new BrowserMultiFormatReader(hints);

        // 1. Ask for the environment camera in the simplest, most bulletproof way
        const constraints = {
            video: {
                facingMode: { ideal: 'environment' },
                width: { ideal: 1280 }, // Lowered to 720p for better macro focus & battery life
                height: { ideal: 720 }
            }
        };

        // 2. Initialize stream
        currentStream = await navigator.mediaDevices.getUserMedia(constraints);
        const video = document.getElementById('preview');
        video.srcObject = currentStream;

        // 3. Torch setup (Wrapped in a try/catch because Apple hates the Torch API)
        try {
            const [track] = currentStream.getVideoTracks();
            torchTrack = track;
            const caps = track.getCapabilities ? track.getCapabilities() : {};
            if (caps && caps.torch) {
                document.getElementById('torch-btn').style.display = 'inline-block';
            }
        } catch (torchErr) {
            console.warn("Torch API not supported on this device.");
        }

        // 4. Start Decoding
        await codeReader.decodeFromStream(currentStream, video, (result, err) => {
            if (locked) return;
            if (result) {
                const clean = result.getText().trim().toUpperCase();
                if (!clean.match(/^\d{6}-[A-Z]+-[A-Z0-9]+$/)) {
                    document.getElementById('status').textContent = 'Invalid QR — not an Order ID';
                    return;
                }
                onSuccess(clean);
            }
        });

    } catch(err) {
        console.error("Camera Init Error:", err);
        document.getElementById('status').textContent = 
            err.name === 'NotAllowedError'
                ? 'Camera access denied. Please allow in settings.'
                : 'Camera error. Please refresh and try again.';
    }
}

        function onSuccess(orderId) {
            locked = true;

            if (currentStream) currentStream.getTracks().forEach(t => t.stop());
            if (codeReader) codeReader.reset();

            document.getElementById('scanner-wrap').style.display = 'none';
            document.getElementById('torch-btn').style.display = 'none';
            document.getElementById('status').style.display = 'none';

            document.getElementById('success-id').textContent = orderId;
            document.getElementById('success-screen').style.display = 'flex';

            setTimeout(() => {
                if (returnUrl) {
                    const separator = returnUrl.includes('?') ? '&' : '?';
                    window.location.href = returnUrl + separator + 'scannedId=' + encodeURIComponent(orderId);
                }
            }, 1200);
        }

        window.restartScanner = function() {
            locked = false;
            document.getElementById('scanner-wrap').style.display = 'block';
            document.getElementById('status').style.display = 'block';
            document.getElementById('status').textContent = 'Align QR code within the frame';
            document.getElementById('success-screen').style.display = 'none';
            startScanner();
        };

        window.toggleTorch = async function() {
            if (!torchTrack) return;
            torchOn = !torchOn;
            await torchTrack.applyConstraints({ advanced: [{ torch: torchOn }] });
        };

        startScanner();
    </script>
</body>
</html>
