<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Raw Camera Test</title>
    <style>
        body { 
            background: #0f172a; color: white; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; min-height: 100vh; margin: 0; 
            font-family: sans-serif; padding: 20px; box-sizing: border-box;
        }
        video { 
            width: 100%; max-width: 400px; aspect-ratio: 1; 
            background: #000; border: 4px solid #334155; border-radius: 16px;
            object-fit: cover;
        }
        button { 
            margin-top: 30px; padding: 20px 40px; font-size: 16px; font-weight: 900; 
            background: #4f46e5; color: white; border: none; border-radius: 12px; 
            text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer;
        }
        #console-log {
            margin-top: 20px; font-family: monospace; color: #fbbf24; 
            text-align: center; font-size: 12px; white-space: pre-wrap;
            background: rgba(0,0,0,0.5); padding: 15px; border-radius: 8px; width: 100%; max-width: 400px;
        }
    </style>
</head>
<body>

    <h2 style="margin-bottom: 20px; text-transform: uppercase; font-weight: 900; font-size: 16px; letter-spacing: 0.1em; opacity: 0.7;">Hardware Test</h2>
    
    <video id="test-video" playsinline autoplay muted></video>
    
    <button id="start-btn">1. Open Camera</button>
    
    <div id="console-log">Awaiting command...</div>

    <script>
        const video = document.getElementById('test-video');
        const btn = document.getElementById('start-btn');
        const logger = document.getElementById('console-log');

        function log(msg) {
            logger.innerText += '\n> ' + msg;
        }

        btn.addEventListener('click', async () => {
            logger.innerText = "Initializing...";
            btn.style.display = 'none';

            try {
                log("Requesting raw media devices...");
                
                // Absolute simplest request possible. No specific resolution or device ID.
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } 
                });
                
                log("Stream acquired! Attaching to video...");
                video.srcObject = stream;
                
                // Tell the video to play and catch any silent browser blocks
                log("Attempting to play video feed...");
                await video.play();
                
                // Find out exactly which lens the phone gave us
                const track = stream.getVideoTracks()[0];
                log("SUCCESS. Camera is LIVE.");
                log("Hardware Lens Name: " + track.label);
                video.style.borderColor = "#4ade80"; // Turn border green
                
            } catch (err) {
                video.style.borderColor = "#ef4444"; // Turn border red
                log("FATAL ERROR: " + err.name);
                log(err.message);
                alert("CAMERA FAILED:\n" + err.name + "\n" + err.message);
            }
        });
    </script>
</body>
</html>
