<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>QC Scanner</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
body { 
    background: #0f172a; display: flex; flex-direction: column; 
    align-items: center; justify-content: center; min-height: 100vh; 
    font-family: sans-serif; padding: 24px; overflow: hidden;
}
h1 { 
    color: white; font-size: 16px; font-weight: 900; 
    letter-spacing: 0.2em; text-transform: uppercase; 
    margin-bottom: 24px; opacity: 0.5; text-align: center;
}
#scanner-wrap { 
    position: relative; 
    width: 100%; /* Expands to fill the phone screen */
    max-width: 500px; /* Prevents it from getting too huge on a desktop monitor */
    aspect-ratio: 1; border-radius: 24px; overflow: hidden; 
    background: #000; border: 2px solid #334155;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5); /* Adds a nice depth shadow */
    display: none;
}
#preview { 
    width: 100%; height: 100%; object-fit: cover; display: block;
}
#overlay { 
    position: absolute; inset: 0; display: flex; 
    align-items: center; justify-content: center; pointer-events: none; 
}
#frame { 
    width: 70%; height: 70%; border: 3px solid rgba(251,191,36,0.8); 
    border-radius: 16px; position: relative; box-shadow: 0 0 0 9999px rgba(0,0,0,0.45);
}
.c { position: absolute; width: 24px; height: 24px; border-color: white; border-style: solid; }
.tl { top:-3px; left:-3px; border-width: 4px 0 0 4px; border-radius: 6px 0 0 0; }
.tr { top:-3px; right:-3px; border-width: 4px 4px 0 0; border-radius: 0 6px 0 0; }
.bl { bottom:-3px; left:-3px; border-width: 0 0 4px 4px; border-radius: 0 0 0 6px; }
.br { bottom:-3px; right:-3px; border-width: 0 4px 4px 0; border-radius: 0 0 6px 0; }
#scanline { 
    position: absolute; left: 5%; right: 5%; height: 3px; 
    background: linear-gradient(90deg, transparent, #fbbf24, transparent); 
    animation: scan 1.5s ease-in-out infinite; top: 0;
}
@keyframes scan { 
    0% { top: 5%; opacity: 1; } 50% { top: 90%; opacity: 1; } 100% { top: 5%; opacity: 1; } 
}
#status { 
    color: rgba(255,255,255,0.5); font-size: 14px; font-weight: 700; 
    text-transform: uppercase; letter-spacing: 0.12em; margin-top: 24px; 
    text-align: center; min-height: 20px;
}
#success-screen {
    display: none; flex-direction: column; align-items: center; 
    gap: 20px; text-align: center;
}
#success-icon { font-size: 72px; }
#success-id { color: #fbbf24; font-size: 32px; font-weight: 900; letter-spacing: 0.05em; }
#success-label { color: rgba(255,255,255,0.4); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.2em; }
#success-msg { color: #4ade80; font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; }
    </style>
</head>
<body>

    <div id="start-screen" style="position: fixed; inset: 0; z-index: 999; background: #0f172a; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;">
        <button onclick="startApp()" style="background: #4f46e5; color: white; padding: 20px 40px; border-radius: 20px; font-size: 16px; font-weight: 900; border: none; box-shadow: 0 10px 30px rgba(79, 70, 229, 0.4); text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer;">
            📸 Start Scanner
        </button>
    </div>

    <h1>Point Camera at QR Code</h1>

    <div id="scanner-wrap">
        <video id="preview" playsinline autoplay muted></video>
        <div id="overlay">
            <div id="frame">
                <div class="c tl"></div><div class="c tr"></div>
                <div class="c bl"></div><div class="c br"></div>
                <div id="scanline"></div>
            </div>
        </div>
    </div>

    <p id="status">Waiting for camera...</p>

    <div id="success-screen">
        <div id="success-icon">✅</div>
        <p id="success-label">Order ID Scanned</p>
        <p id="success-id"></p>
        <p id="success-msg">Returning to console...</p>
        <button onclick="window.location.reload()" style="background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 12px 28px; border-radius: 12px; font-weight: 900; font-size: 12px; text-transform: uppercase; cursor: pointer; margin-top: 8px;">Scan Again</button>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const returnUrl = params.get('return');

        let locked = false;
        let videoStream = null;

        // Hidden canvas to extract video frames safely
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });

        window.startApp = async function() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('status').textContent = 'Initializing hardware...';

            try {
                // Locking ideal width to 1280 (720p) prevents the OS from attempting macro-lens handoffs
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } } 
                });
                
                videoStream = stream;
                const videoEl = document.getElementById('preview');
                videoEl.srcObject = stream;
                await videoEl.play();
                
                document.getElementById('scanner-wrap').style.display = 'block';
                document.getElementById('status').textContent = 'Align QR code within the frame';

                // Kick off the isolated scanning loop
                requestAnimationFrame(scanLoop);

            } catch (err) {
                document.getElementById('status').textContent = 'Camera permission denied.';
                alert("CAMERA FAILED:\n" + err.name + "\n" + err.message);
                document.getElementById('start-screen').style.display = 'flex';
            }
        };

        function scanLoop() {
            if (locked) return;
            
            const videoEl = document.getElementById('preview');
            
            // Only scan if the video has loaded enough data to draw
            if (videoEl.readyState === videoEl.HAVE_ENOUGH_DATA) {
                canvas.width = videoEl.videoWidth;
                canvas.height = videoEl.videoHeight;
                ctx.drawImage(videoEl, 0, 0, canvas.width, canvas.height);
                
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                
                // jsQR quietly checks the pixels without touching the camera API
                const code = jsQR(imageData.data, imageData.width, imageData.height, {
                    inversionAttempts: "dontInvert",
                });

                if (code) {
                    const clean = code.data.trim().toUpperCase();
                    if (!clean.match(/^\d{6}-[A-Z]+-[A-Z0-9]+$/)) {
                        document.getElementById('status').textContent = 'Invalid QR — not an Order ID';
                    } else {
                        onSuccess(clean);
                        return; // Stop the loop
                    }
                }
            }
            // Keep looping
            requestAnimationFrame(scanLoop);
        }

        function onSuccess(orderId) {
            locked = true;
            
            // Turn off the camera hardware immediately to save battery
            if (videoStream) {
                videoStream.getTracks().forEach(track => track.stop());
            }
            
            // Note: The screen will go dark blue here because we hide the camera to show the success message!
            document.getElementById('scanner-wrap').style.display = 'none';
            document.getElementById('status').style.display = 'none';

            document.getElementById('success-id').textContent = orderId;
            document.getElementById('success-screen').style.display = 'flex';

            setTimeout(() => {
                if (returnUrl) {
                    const separator = returnUrl.includes('?') ? '&' : '?';
                    window.location.href = returnUrl + separator + 'scannedId=' + encodeURIComponent(orderId);
                }
            }, 1200);
        }
    </script>
</body>
</html>
